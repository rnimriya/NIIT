apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  labels:
    {{- include "neet-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "neet-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: http
