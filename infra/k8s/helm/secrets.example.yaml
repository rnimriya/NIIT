# Example secret consumed by all services via envFrom (neet-secrets).
# Copy, fill real values, and apply with `kubectl apply -f` (do NOT commit secrets).
apiVersion: v1
kind: Secret
metadata:
  name: neet-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgres://neet:CHANGEME@<rds-endpoint>:5432/neet"
  JWT_DEV_SECRET: "change-me-in-prod"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  STRIPE_PRICE_PLUS: ""
  STRIPE_PRICE_PRO: ""
  RESEND_API_KEY: ""
  CLICKHOUSE_PASSWORD: "neet"
