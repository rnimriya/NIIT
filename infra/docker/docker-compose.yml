# Local vertical slice: Postgres + Redis + Auth + AI gateway + Web.
# Boots with zero AI keys (tutor runs in mock mode). Auth runs DB migrations
# on boot; AI persists conversations to Postgres.
#
#   docker compose -f infra/docker/docker-compose.yml up --build
#   → web   http://localhost:3000
#   → auth  http://localhost:4002/readyz
#   → ai    http://localhost:4001/readyz

name: neet-ai

x-db-url: &db-url postgres://neet:neet@postgres:5432/neet

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neet
      POSTGRES_PASSWORD: neet
      POSTGRES_DB: neet
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neet"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=700M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    environment:
      AUTH_PORT: 4002
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
    ports: ["4002:4002"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test:
        ["CMD", "node", "-e",
         "fetch('http://localhost:4002/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12

  ai:
    build:
      context: ../..
      dockerfile: services/ai/Dockerfile
    environment:
      AI_PORT: 4001
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PAYMENTS_URL: http://payments:4006
    ports: ["4001:4001"]
    depends_on:
      auth: { condition: service_healthy } # auth applies migrations first

  tests:
    build:
      context: ../..
      dockerfile: services/tests/Dockerfile
    environment:
      TESTS_PORT: 4003
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
      NOTIFICATIONS_URL: http://notifications:4007
      KAFKA_BROKERS: redpanda:9092
    ports: ["4003:4003"]
    depends_on:
      auth: { condition: service_healthy } # migrations applied; then seeds bank
      redpanda: { condition: service_healthy }

  prediction:
    build:
      context: ../..
      dockerfile: services/prediction/Dockerfile
    environment:
      PREDICTION_PORT: 4004
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
      KAFKA_BROKERS: redpanda:9092
    ports: ["4004:4004"]
    depends_on:
      auth: { condition: service_healthy }
      redpanda: { condition: service_healthy }

  study:
    build:
      context: ../..
      dockerfile: services/study/Dockerfile
    environment:
      STUDY_PORT: 4005
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
      AI_URL: http://ai:4001
      PREDICTION_URL: http://prediction:4004
      PAYMENTS_URL: http://payments:4006
      NOTIFICATIONS_URL: http://notifications:4007
    ports: ["4005:4005"]
    depends_on:
      auth: { condition: service_healthy }

  payments:
    build:
      context: ../..
      dockerfile: services/payments/Dockerfile
    environment:
      PAYMENTS_PORT: 4006
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PLUS: ${STRIPE_PRICE_PLUS:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      NOTIFICATIONS_URL: http://notifications:4007
    ports: ["4006:4006"]
    depends_on:
      auth: { condition: service_healthy }

  notifications:
    build:
      context: ../..
      dockerfile: services/notifications/Dockerfile
    environment:
      NOTIFICATIONS_PORT: 4007
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      KAFKA_BROKERS: redpanda:9092
    ports: ["4007:4007"]
    depends_on:
      auth: { condition: service_healthy }
      redpanda: { condition: service_healthy }

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_AI_URL: http://localhost:4001
        NEXT_PUBLIC_AUTH_URL: http://localhost:4002
        NEXT_PUBLIC_TESTS_URL: http://localhost:4003
        NEXT_PUBLIC_PREDICTION_URL: http://localhost:4004
        NEXT_PUBLIC_STUDY_URL: http://localhost:4005
        NEXT_PUBLIC_PAYMENTS_URL: http://localhost:4006
        NEXT_PUBLIC_NOTIFICATIONS_URL: http://localhost:4007
    ports: ["3000:3000"]
    depends_on: ["ai", "auth", "tests", "prediction", "study", "payments", "notifications"]

volumes:
  pgdata:
