# Local vertical slice: Postgres + Redis + Auth + AI gateway + Web.
# Boots with zero AI keys (tutor runs in mock mode). Auth runs DB migrations
# on boot; AI persists conversations to Postgres.
#
#   docker compose -f infra/docker/docker-compose.yml up --build
#   → web   http://localhost:3000
#   → auth  http://localhost:4002/readyz
#   → ai    http://localhost:4001/readyz

name: neet-ai

x-db-url: &db-url postgres://neet:neet@postgres:5432/neet

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neet
      POSTGRES_PASSWORD: neet
      POSTGRES_DB: neet
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neet"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    environment:
      AUTH_PORT: 4002
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
    ports: ["4002:4002"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test:
        ["CMD", "node", "-e",
         "fetch('http://localhost:4002/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12

  ai:
    build:
      context: ../..
      dockerfile: services/ai/Dockerfile
    environment:
      AI_PORT: 4001
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports: ["4001:4001"]
    depends_on:
      auth: { condition: service_healthy } # auth applies migrations first

  tests:
    build:
      context: ../..
      dockerfile: services/tests/Dockerfile
    environment:
      TESTS_PORT: 4003
      DATABASE_URL: *db-url
      JWT_DEV_SECRET: ${JWT_DEV_SECRET:-dev-only-change-me}
    ports: ["4003:4003"]
    depends_on:
      auth: { condition: service_healthy } # migrations applied; then seeds bank

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_AI_URL: http://localhost:4001
        NEXT_PUBLIC_AUTH_URL: http://localhost:4002
        NEXT_PUBLIC_TESTS_URL: http://localhost:4003
    ports: ["3000:3000"]
    depends_on: ["ai", "auth", "tests"]

volumes:
  pgdata:
