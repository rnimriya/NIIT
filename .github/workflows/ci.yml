name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neet
          POSTGRES_PASSWORD: neet
          POSTGRES_DB: neet
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U neet"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://neet:neet@localhost:5432/neet
      JWT_DEV_SECRET: ci-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build (turbo, topological)
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Integration smoke test (HTTP path)
        run: bash scripts/smoke.sh

      - name: Start Kafka (Redpanda)
        run: |
          docker run -d --name redpanda -p 9092:9092 redpandadata/redpanda:latest \
            redpanda start --smp 1 --memory 700M --reserve-memory 0M --overprovisioned \
            --node-id 0 --check=false \
            --kafka-addr PLAINTEXT://0.0.0.0:9092 \
            --advertise-kafka-addr PLAINTEXT://localhost:9092
          for i in $(seq 1 60); do docker exec redpanda rpk cluster info >/dev/null 2>&1 && break; sleep 1; done

      - name: Event-driven smoke test (Kafka path)
        run: bash scripts/smoke-events.sh
        env:
          KAFKA_BROKERS: localhost:9092

      - name: Start ClickHouse
        run: |
          docker run -d --name clickhouse -p 8123:8123 \
            -e CLICKHOUSE_PASSWORD=neet --ulimit nofile=262144:262144 \
            clickhouse/clickhouse-server:latest
          for i in $(seq 1 60); do curl -sf http://localhost:8123/ping >/dev/null 2>&1 && break; sleep 1; done

      - name: Analytics smoke test (ClickHouse sink)
        run: bash scripts/smoke-analytics.sh
        env:
          KAFKA_BROKERS: localhost:9092
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_PASSWORD: neet
