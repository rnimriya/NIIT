name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neet
          POSTGRES_PASSWORD: neet
          POSTGRES_DB: neet
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U neet"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://neet:neet@localhost:5432/neet
      JWT_DEV_SECRET: ci-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build (turbo, topological)
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Integration smoke test
        run: bash scripts/smoke.sh
